name: Tests

on:
  pull_request:
    branches:
      - main
      - staging
      - development

  workflow_dispatch:

concurrency:
  group: tests-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  static:
    name: "Static Analysis (PHP 8.1)"
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.1"
          coverage: none

      - name: PHP Lint
        run: |
          ERRORS=0
          while IFS= read -r -d '' file; do
            php -l "$file" 2>&1 | grep -qv "No syntax errors" && ERRORS=$((ERRORS+1))
          done < <(find . -name '*.php' -print0)
          echo "Lint errors: $ERRORS"
          test "$ERRORS" -eq 0 || exit 1

      - name: Build plugin ZIP
        id: build
        run: |
          cd ..
          zip -r "wurrr/wurrr.zip" wurrr/ \
            -x "wurrr/.git/*" "wurrr/.github/*" "wurrr/.*" "wurrr/*.zip" "wurrr/AGENTS.md"
          echo "zip_file=${{ github.workspace }}/wurrr.zip" >> "$GITHUB_OUTPUT"

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: plugin-build
          path: ${{ steps.build.outputs.zip_file }}
          if-no-files-found: error

  integration:
    name: "WP + WC + Plugin Check (PHP 8.1)"
    runs-on: ubuntu-latest
    needs: static

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: wordpress_test
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.1"
          extensions: mysqli, intl, zip
          tools: wp-cli

      - name: Cache WP-CLI downloads
        uses: actions/cache@v4
        with:
          path: ~/.wp-cli/cache
          key: ${{ runner.os }}-wp-cli-cache

      - name: Install WordPress
        run: |
          wp core download --path=/tmp/wordpress --allow-root
          wp config create \
            --dbname=wordpress_test --dbuser=root --dbpass=root --dbhost=127.0.0.1 \
            --path=/tmp/wordpress --allow-root
          wp core install \
            --url=http://localhost --title="Wurrr Test" \
            --admin_user=admin --admin_password=admin --admin_email=test@test.com \
            --path=/tmp/wordpress --allow-root

      - name: Install WooCommerce
        run: |
          wp plugin install woocommerce --activate --path=/tmp/wordpress --allow-root

      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: plugin-build
          path: /tmp/plugin-build

      - name: Install plugin from build
        run: |
          unzip -q /tmp/plugin-build/wurrr.zip -d /tmp/wordpress/wp-content/plugins/
          ls -la /tmp/wordpress/wp-content/plugins/wurrr/

      - name: Activate plugin
        run: |
          wp plugin activate wurrr --path=/tmp/wordpress --allow-root

      - name: Verify plugin header and PHP load
        run: |
          wp eval '
            $data = get_plugin_data("/tmp/wordpress/wp-content/plugins/wurrr/wurrr.php");
            echo "Name:    " . $data["Name"] . "\n";
            echo "Version: " . $data["Version"] . "\n";
            echo "WC req:  " . ($data["WC requires at least"] ?? "N/A") . "\n";

            $loaded = class_exists("Fulfex_Plugin") && class_exists("Fulfex_Admin") && class_exists("Fulfex_Cache");
            echo "Classes: " . ($loaded ? "OK" : "FAIL") . "\n";
            if (!$loaded) exit(1);
          ' --path=/tmp/wordpress --allow-root

      - name: Verify providers are registered
        run: |
          wp eval '
            $providers = apply_filters("wp_exchange_providers", []);
            echo "Providers: " . count($providers) . "\n";
            foreach ($providers as $p) {
              echo "  - " . $p->get_id() . " (" . $p->get_name() . ")\n";
            }
            if (count($providers) < 1) exit(1);
          ' --path=/tmp/wordpress --allow-root

      - name: Verify Frankfurter works (no API key)
        run: |
          wp eval '
            $providers = apply_filters("wp_exchange_providers", []);
            $frank = null;
            foreach ($providers as $p) {
              if ($p->get_id() === "frankfurter") { $frank = $p; break; }
            }
            if (!$frank) { echo "Frankfurter not found in providers\n"; exit(1); }

            $start = microtime(true);
            $rates = $frank->fetch_rates("USD");
            $latency = round(microtime(true) - $start, 4);

            $count = count($rates["conversion_rates"] ?? []);
            $base  = $rates["base_code"] ?? "?";
            echo "Frankfurter: base=$base currencies=$count latency=$latency" . "s\n";

            if ($count < 10) {
              echo "FAIL: too few currencies\n";
              exit(1);
            }
            echo "Frankfurter OK\n";
          ' --path=/tmp/wordpress --allow-root

      - name: Verify shortcode renders
        run: |
          wp eval '
            $frontend = new Fulfex_Frontend(
              new Fulfex_Currency(
                new Fulfex_API(new Fulfex_Cache()),
                new Fulfex_Cache()
              )
            );
            $html = $frontend->render_switcher();
            if (strpos($html, "wurrr-switcher") === false) {
              echo "FAIL: shortcode missing switcher class\n";
              exit(1);
            }
            echo "Shortcode OK: " . strlen($html) . " bytes\n";
          ' --path=/tmp/wordpress --allow-root

      - name: Deactivate and reactivate (lifecycle)
        run: |
          wp plugin deactivate wurrr --path=/tmp/wordpress --allow-root
          wp plugin activate wurrr --path=/tmp/wordpress --allow-root
          wp eval 'echo "Reactivate OK\n";' --path=/tmp/wordpress --allow-root

      - name: Install Plugin Check
        run: |
          wp plugin install plugin-check --activate --path=/tmp/wordpress --allow-root

      - name: Run Plugin Check (WP.org compliance)
        id: plugin-check
        run: |
          wp plugin check wurrr \
            --path=/tmp/wordpress \
            --allow-root \
            --format=json \
            --categories=general,plugin_repo,security,performance,accessibility \
            > /tmp/plugin-check-results.json 2>&1 || true

          cat /tmp/plugin-check-results.json

          ERRORS=$(php -r '
            $content = file_get_contents("/tmp/plugin-check-results.json");
            $sections = preg_split("/^FILE: /m", $content, -1, PREG_SPLIT_NO_EMPTY);
            $count = 0;
            foreach ($sections as $s) {
              $nl = strpos($s, "\n");
              $items = json_decode(trim(substr($s, $nl)), true) ?: [];
              foreach ($items as $i) { if ($i["type"]==="ERROR") $count++; }
            }
            echo $count;
          ')

          WARNINGS=$(php -r '
            $content = file_get_contents("/tmp/plugin-check-results.json");
            $sections = preg_split("/^FILE: /m", $content, -1, PREG_SPLIT_NO_EMPTY);
            $count = 0;
            foreach ($sections as $s) {
              $nl = strpos($s, "\n");
              $items = json_decode(trim(substr($s, $nl)), true) ?: [];
              foreach ($items as $i) { if ($i["type"]==="WARNING") $count++; }
            }
            echo $count;
          ')

          echo "Plugin Check: ${ERRORS} error(s), ${WARNINGS} warning(s)"

          if [ "$ERRORS" -gt 0 ]; then
            echo "::error::Plugin Check found ${ERRORS} error(s)."
            exit 1
          fi

      - name: Upload Plugin Check results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: plugin-check-results
          path: /tmp/plugin-check-results.json
          overwrite: true
